  - id: bhv_schenkel_1947_english
    url: "https://davemech.org/wolf-news-and-information/schenkels-classic-wolf-behavior-study-available-in-english/"
    url_verified: true
    url_verified_method: "WebSearch confirmed live (davemech.org self-hosted, Mech blog post announcing the English translation)"
    title: "Schenkel's Classic Wolf Behavior Study Available in English"
    authors: ["Schenkel, Rudolph"]
    publisher: "davemech.org (translation hosted by L. David Mech, original: Behaviour 1:81-129)"
    publication_date: "1947 (original); English translation hosted on davemech.org, post-2010"
    license: "fair_use_excerpt"
    license_note: >
      Original Schenkel 1947 was published in journal Behaviour (Brill).
      English translation is hosted by Mech for scholarly access; treat
      as fair-use citation surrogate. Use short quotes only; cite the
      Brill original as primary publication.
    ontology_targets:
      - cat_3_contradiction_pair: "dominance_theory_pre_1999 (foundational, captive-wolf-based claim)"
      - cat_6_temporal_chain: "dominance_to_positive_reinforcement (origin node)"
    why_fits: >
      The foundational paper that introduced the alpha-wolf / dominance
      hierarchy framing later imported into dog training. Required as
      the "before" side of the seeded Cat 3 contradiction pair.
    summary_hint: >
      Schenkel's observations of captive wolves at Basel Zoo described
      a rigid pack hierarchy with an alpha pair maintaining dominance
      through aggression. The captivity context, later identified by
      Mech 1999 as the source of the misreading, is itself documented
      in the paper.
    notes: >
      Direct PDF mirror also exists at
      https://davemech.org/wp-content/uploads/2018/06/ExpressionstudiesP.1-10.pdf
      (first 10 pages excerpt) and the full English text is on the
      Internet Archive: https://archive.org/details/SchenkelCaptiveWolfStudy.compressed
      Maintainer should pick whichever URL is most stable for the
      vault frontmatter; Mech's hosted page is the most contextually
      authoritative because Mech himself republished it.

  - id: bhv_mech_1999_self_correction
    url: "https://www.wolf.org/wp-content/uploads/2013/09/267alphastatus_english.pdf"
    url_verified: true
    url_verified_method: "WebSearch confirmed live (International Wolf Center hosting the journal PDF)"
    title: "Alpha status, dominance, and division of labor in wolf packs"
    authors: ["Mech, L. David"]
    publisher: "Canadian Journal of Zoology, 77: 1196-1203"
    publication_date: "1999"
    license: "self_hosted_with_author_permission"
    license_note: >
      PDF mirrored by the International Wolf Center (Mech is founder).
      USGS Northern Prairie Wildlife Research Center mirror at
      https://digitalcommons.unl.edu/usgsnpwrc/381/ is a US-government
      work and public domain under 17 USC 105. Either URL is citable.
    ontology_targets:
      - cat_3_contradiction_pair: "dominance_theory_post_1999 (the self-correction)"
      - cat_6_temporal_chain: "dominance_to_positive_reinforcement (pivot node)"
    why_fits: >
      The pivotal self-correction paper. Mech, who popularized the
      alpha-wolf framing in his 1970 book "The Wolf," concluded after
      13 summers observing wild wolves on Ellesmere Island that the
      captive-wolf dominance model does not describe natural pack
      structure (which is family-based, not hierarchy-based). This is
      THE Cat 3 contradiction target.
    summary_hint: >
      "The typical wolf pack ... is a family, with the adult parents
      guiding the activities of the group in a division-of-labor
      system." Mech argues the term 'alpha' is misleading and should
      be retired for natural packs.
    notes: >
      USGS public-domain mirror available at
      https://digitalcommons.unl.edu/usgsnpwrc/381/ — preferable for
      explicit license clarity if maintainer wants public-domain
      framing. RZSS learning portal also mirrors the PDF.

  - id: bhv_mech_alpha_outdated_video_post
    url: "https://davemech.org/wolf-news-and-information/"
    url_verified: true
    url_verified_method: "WebSearch confirmed live (Mech's own news index page)"
    title: "Wolf News and Information (index, including 'Outdated Wolf Information' / 'Whatever Happened to the Term Alpha Wolf?')"
    authors: ["Mech, L. David"]
    publisher: "davemech.org"
    publication_date: "2008-2013 (multiple posts; Mech video re alpha-wolf term published 2008)"
    license: "fair_use_excerpt"
    license_note: >
      Author-self-hosted commentary; fair-use excerpt with attribution
      is appropriate for the corpus. Direct quotes should be short.
    ontology_targets:
      - cat_3_contradiction_pair: "dominance_theory_post_1999 (popular-audience reinforcement)"
      - cat_6_temporal_chain: "dominance_to_positive_reinforcement (popular-audience pivot)"
    why_fits: >
      Mech's plain-language explanation of why he no longer endorses
      the alpha-wolf framing. Useful as the bridge entity between the
      academic 1999 paper and the AVSAB position statements that drew
      on his work for the dog-training context.
    summary_hint: >
      Mech states the alpha-wolf concept is outdated for natural wolf
      packs and asks publishers to stop marketing his 1970 book "The
      Wolf" because of its outdated dominance framing.
    notes: >
      The exact post URL has rotated on the davemech.org site over the
      years; the news index is the stable entry point. Maintainer
      should pick a permalinked individual post when authoring the
      vault note.

