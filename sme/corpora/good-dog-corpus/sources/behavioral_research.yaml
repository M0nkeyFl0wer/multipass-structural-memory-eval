    - { source_id: bhv_ziv_2017_aversive_review, year: 2017, role: "empirical literature review" }
    - { source_id: bhv_vieiradecastro_2020_plos, year: 2020, role: "empirical primary study" }
    - { source_id: bhv_avsab_2021_humane_training, year: 2021, role: "current professional consensus" }
  notes: >
    `supersedes` edges should run from each later node to the relevant
    earlier node(s) per ontology.yaml#supersedes evidence_rule
    (explicit_marker). Mech 1999 explicitly supersedes Schenkel 1947's
    captive-wolf basis ("a notion that has been widely accepted ...
    is no longer accurate"). AVSAB 2021 explicitly references and
    extends AVSAB 2008. The other supersession links are normative
    rather than literal-marker — flag for human grounding per the
    ontology's contradicts/subject_of pattern.

