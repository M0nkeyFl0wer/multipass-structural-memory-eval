  ordered_nodes:
    - { source_id: bhv_schenkel_1947_english, year: 1947, role: "origin (captive-wolf hierarchy)" }
    - { source_id: bhv_mech_1999_self_correction, year: 1999, role: "academic self-correction" }
    - { source_id: bhv_mech_alpha_outdated_video_post, year: 2008, role: "popular-audience repudiation" }
