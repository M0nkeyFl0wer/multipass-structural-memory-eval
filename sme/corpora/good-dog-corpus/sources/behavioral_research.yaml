# --- Contradiction-pair binding -----------------------------------
#
# The seeded Cat 3 + Cat 6 chain in this domain.

contradiction_pairs:

  - id: dominance_theory_pre_vs_post_1999
    label: "Dominance theory in dog training: 1947 captive-wolf basis vs 1999+ self-correction and humane-training consensus"
    sides:
      pre_correction_source_ids:
        - bhv_schenkel_1947_english
      post_correction_source_ids:
        - bhv_mech_1999_self_correction
        - bhv_mech_alpha_outdated_video_post
        - bhv_avsab_2008_dominance_position
        - bhv_avsab_2021_humane_training
        - bhv_ziv_2017_aversive_review
        - bhv_vieiradecastro_2020_plos
    notes: >
      The contradiction is well-bound on both sides. The pre-1999 side
      currently has a single source (Schenkel 1947), which is
      historically appropriate — Schenkel is the cited foundation for
      virtually every later dominance-training claim. If the corpus
      wants more pre-1999 material, candidates would be: Mech 1970
      "The Wolf" (book, not freely available online; Mech now asks
      publishers to stop reprinting it), or Monks of New Skete 1978
      "How to Be Your Dog's Best Friend" (book, popular-audience
      dominance training). Both would require print sources.

# --- Temporal chain (Cat 6) ---------------------------------------

