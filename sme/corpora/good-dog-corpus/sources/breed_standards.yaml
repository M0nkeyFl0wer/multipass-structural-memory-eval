  # ontology.yaml notes block flags explicitly. A system that merges
  # APBT and AmStaff is silently merging two distinct registered
  # breeds. Hence two registry sources are required: UKC for APBT,
  # AKC for AmStaff.
  # -------------------------------------------------------------------

