    why_fits: "FDA's canonical multi-stage outbreak advisory page consolidating the Sept 3, Oct 30, and Nov 9 2023 recall stages; this single URL is the primary subject_of node for the entire Cat 6 chain."
    summary_hint: "Sept 3 2023 initial recall (Victor Hi-Pro Plus lot 1000016385, Best By 4/30/24, Salmonella positive on SC Dept of Ag random sample); Oct 30 2023 expansion to three lots of Victor Select Beef Meal & Brown Rice; Nov 9 2023 expansion to all products with Best By dates before 10/31/24 (Victor, Eagle Mountain, Wayne Feeds, Members Mark) after Salmonella Kiambu found in lot tied to consumer human-illness complaint. Seven Salmonella Kiambu human cases across 7 states (AL, CA, FL, HI, KY, MN, OK), six in children under 1, one hospitalization."
