# Ontology for good-dog-corpus
#
# This file is the schema. The design narrative behind every choice
# below — including alternatives considered and rejection rationale —
# is in ONTOLOGY.md. Read that first if you want to understand why
# the schema is what it is.
#
# Versioned. Extensions follow the discipline documented in
# ONTOLOGY.md §7.

version: "good-dog-corpus-v0.3"
source: "hand-designed"
designed_on: "2026-04-30"
designed_by: "M0nkeyFl0wer"
purpose: >
  Worked example of ontology-first KG design for the SME framework.
  The corpus exists to materialize the ontology, not the other way around.

# --- Entity types ---------------------------------------------------
#
# Eight types. Rationale and rejected alternatives in ONTOLOGY.md §2.

entity_types:

  - id: breed
    description: "A recognized dog breed or breed group"
    examples: ["German Shepherd", "Border Collie", "American Pit Bull Terrier"]
    notes: "First-class because breeds have registry authority and alias resolution as central tests"

  - id: person
    description: "Named individual: researcher, vet, trainer, journalist, council member"
    notes: "One type, not per-role subtypes. Role information lives in edges."

  - id: organization
    description: "Kennel club, university, vet hospital, municipality, regulatory body"
    fields:
      is_regulatory: "boolean — whether this organization holds jurisdictional authority"

  - id: publication
    description: "Study, article, bylaw, recall notice — anything authored"
    notes: "Subtypes encoded by source domain (file path), not by entity subtype"

  - id: concept
    description: "Idea or methodology: dominance theory, positive reinforcement, BSL"
    notes: "First-class because concepts get superseded, regulated, and traversed in multi-hop"

  - id: product
    description: "Specific commercial product, brand, or SKU"
    fields:
      brand: "string — manufacturer name"

  - id: event
    description: "Recall announcement, council vote, study publication, attack incident"
    fields:
      timestamp: "ISO8601 — when the event occurred"
      status: "active | resolved | ongoing"

  - id: location
    description: "City, park, shelter, jurisdiction"
    fields:
      jurisdiction_type: "municipal | regional | national"

# --- Edge types with evidence rules --------------------------------
#
# Eleven types. Each registers an evidence rule for the phantom-edge
# probe (Cat 4g). Rationale and rejected alternatives in ONTOLOGY.md §3.

edge_types:

  - id: mentions
    direction: "publication -> *"
    description: "Base relation: a document mentions an entity"
    evidence_rule:
      type: "lexical"
      method: "canonical_or_alias_substring_match"
      threshold: 1
      notes: "Matches canonical name or any registered alias in document text"

  - id: alias_of
    direction: "* -> *"
    same_type: true   # v0.2: an alias never crosses entity type (SKOS altLabel / owl:sameAs)
    description: "Two surface forms refer to the SAME canonical entity (same entity type)"
    notes: >
      v0.2: constrained to same-type. The gold set's `contrast` block exists to
      prevent cross-type aliasing (e.g. Hill's[organization] != Hill's Science
      Diet[product], Brucella canis[concept] != brucellosis[concept-as-disease]).
      This is the entity-resolution / SKOS altLabel relation — registry- and
      resolver-proposed, not freely LLM-extracted.
    evidence_rule:
      type: "registry"
      method: "authoritative_alias_list"
      source: "ontology.yaml#aliases or breed_standards/* documents"

  - id: supersedes
    direction: "publication -> publication"
    description: "Newer finding/policy/recommendation replaces older"
    evidence_rule:
      type: "explicit_marker"
      method: "temporal_replacement_phrases"
      patterns:
        - "replaces"
        - "withdrawn"
        - "now recommended over"
        - "supersedes"
        - "superseded by"
        - "no longer current"

  - id: contradicts
    direction: "publication -> publication"
    description: "Two publications make incompatible claims about the same entity"
    notes: "Distinct from supersedes: contradictory publications can be contemporaneous"
    evidence_rule:
      type: "claim_pair"
      method: "shared_subject_with_opposed_predicate"
      requires_human_grounding: true
      notes: "v0.1 honest position: contradiction detection is a research problem, human-annotated"

  - id: cites
    direction: "publication -> publication"
    description: "Explicit reference"
    evidence_rule:
      type: "explicit_reference"
      method: "doi_url_or_citation_match"

  - id: authored_by
    direction: "publication -> person"
    description: "Authorship"
    evidence_rule:
      type: "byline"
      method: "author_field_match"

  - id: affiliated_with
    direction: "person -> organization"
    description: "Person is affiliated with organization (currently — no time bounds in v0.1)"
    evidence_rule:
      type: "explicit_assertion"
      method: "affiliation_phrase_match"
      patterns:
        - "<person>, <organization>"
        - "<person> of <organization>"
        - "<person> at <organization>"

  - id: regulates
    direction: "organization -> product | concept"
    description: "Regulatory body has jurisdiction over the entity"
    requires:
      source.is_regulatory: true
    evidence_rule:
      type: "regulatory_authority"
      method: "scope_assertion_in_authoritative_document"

  - id: subject_of
    direction: "publication -> event | concept"
    description: "Document is primarily about a specific event or concept"
    notes: "Distinct from mentions: subject_of is the primary topic, not just a reference"
    evidence_rule:
      type: "topic_match"
      method: "title_or_abstract_subject_extraction"
      requires_human_grounding: true

  - id: member_of
    direction: "person -> organization"
    description: "Person's membership in an organization (= schema.org memberOf)"
    notes: >
      v0.2: narrowed to person -> organization. The breed-grouping sense was
      split out into `grouped_under` — the v0.1 overload of one label across two
      unrelated relation shapes (breed->breed and person->organization) is
      resolved. OntoClean/identity: the two had incompatible endpoint identity
      criteria, so one label was masking two relations.
    evidence_rule:
      type: "explicit"
      method: "explicit_membership_assertion"

  - id: grouped_under
    direction: "breed -> breed"
    description: "A breed belongs to a broader breed group, e.g. German Shepherd -> Herding Group (SKOS broader)"
    notes: >
      v0.2: split out of the overloaded `member_of`. Adds the taxonomic spine the
      otherwise-flat (RR=1.0, no is-a) ontology lacked. Breed groups are
      themselves `breed`-typed entities (the YAML treats a breed grouping as a
      recognized breed).
    evidence_rule:
      type: "registry"
      method: "registered_in_breed_taxonomy"

  - id: located_in
    direction: "event | organization -> location"
    description: "Spatial scoping"
    evidence_rule:
      type: "explicit_location"
      method: "location_field_or_address_match"

  # --- v0.3 additions (corpus expansion 2026-06-17) ----------------
  # Added to support the Cat 5 (gap) + Cat 8 (ontology coherence)
  # expansion sources. Note: the breed -> breed-group relation remains
  # `grouped_under` (a registry "member_of_group" is the SAME relation
  # under this ontology — do not introduce a parallel member_of_group).

  - id: subclass_of
    direction: "breed -> breed | concept -> concept"
    description: "Formal is-a / logical subsumption (e.g. a Vertebrate Breed Ontology DL hierarchy term). Distinct from grouped_under, which is registry/SKOS-broader group membership, not a logical is-a."
    notes: >
      v0.3: introduced for the Vertebrate Breed Ontology (B4), which is a
      description-logic ontology with a reasoner. subclass_of is the OWL/DL
      is-a; grouped_under is the looser registry grouping (AKC Herding Group).
      Keeping them separate lets Cat 8 test whether a system conflates a
      formal taxonomy with a registry's marketing groups.
    evidence_rule:
      type: "explicit"
      method: "explicit_subclass_assertion_in_ontology_or_standard"

  - id: conforms_to
    direction: "product | publication -> publication"
    description: "An entity conforms to (is validated against) a controlled vocabulary or formal standard, e.g. a pet food conforms to an AAFCO nutrient profile."
    notes: >
      v0.3: introduced for the FDA/AAFCO 'complete and balanced' standard (B5).
      The conformance target is the standard document (publication). Powers
      Cat 8 SHACL-style conformance checks.
    evidence_rule:
      type: "explicit"
      method: "explicit_conformance_claim_against_named_standard"

  - id: source_of
    direction: "organization | publication -> publication"
    description: "A registry/dataset is a declared source ingested by a downstream standard or aggregator (e.g. the Vertebrate Breed Ontology lists AKC/FCI/UKC as breed sources)."
    notes: >
      v0.3: introduced for VBO's source list (A4). Distinct from cites: cites is
      scholarly reference; source_of is data-provenance ingestion. The ABSENCE
      of a source_of edge for a registry VBO did not ingest is a Cat 5 signal.
    evidence_rule:
      type: "explicit"
      method: "explicit_source_listing_in_aggregator"

  - id: at_risk_status
    direction: "breed -> concept"
    description: "A breed population carries a conservation / risk status (e.g. FAO DAD-IS at-risk, transboundary, or extinct categorisation). The risk category is a concept entity."
    notes: >
      v0.3: introduced for FAO DAD-IS (A3). The structurally-uneven coverage
      (local vs transboundary, at-risk vs unknown) is the Cat 5 gap — a breed
      recorded nationally but absent from transboundary records is the hole.
    evidence_rule:
      type: "explicit"
      method: "explicit_risk_status_field_in_registry"

# --- Aliases (the registry) ----------------------------------------
#
# Per-entity canonical alias mapping. Exercises Cat 4 (ingestion
# integrity) directly. Breeds are the most common alias source in
# the dog domain; this section will grow as the corpus fills in.

aliases:

  german_shepherd:
    canonical: "German Shepherd"
    aliases:
      - "GSD"
      - "Alsatian"
      - "German Shepherd Dog"
    source: "AKC breed registry"

  pit_bull:
    canonical: "American Pit Bull Terrier"
    aliases:
      - "Pit Bull"
      - "APBT"
      - "Pitbull"
    source: "UKC breed registry"
    notes: >
      Distinct from American Staffordshire Terrier despite frequent
      conflation in media. The conflation itself is a Cat 4 test:
      a system that collapses APBT and AmStaff is silently merging
      two registered breeds.

  golden_retriever:
    canonical: "Golden Retriever"
    aliases:
      - "Goldie"
      - "Golden"
    source: "AKC breed registry"

# --- Out of scope --------------------------------------------------
#
# Documented exclusions. These are kept here so corpus contributors
# know what was left out on purpose vs what was omitted by accident.

out_of_scope:

  - id: subjective_stance
    description: "Opinion-level claims (BSL pros/cons as advocacy positions)"
    reason: "Stance modeling is a separate problem; corpus stays factual"

  - id: individual_dog_narratives
    description: "Specific named dogs in adoption stories or local incidents"
    reason: "Treated as character mentions, not graph entities; would explode entity count"

  - id: image_content
    description: "Visual content of source articles"
    reason: "Out of textual KG scope"

# --- Connection to SME categories ----------------------------------
#
# Mapping of which schema elements each SME category exercises.
# Designed against the categories, not retrofitted.

sme_category_coverage:

  cat_1_factual_retrieval:
    uses: ["mentions", "subject_of"]
    representative_question: "What recalls happened to brand X in 2023?"

  cat_2c_multi_hop:
    uses: ["authored_by", "affiliated_with", "cites", "subject_of"]
    examples:
      - "vet author -> affiliation -> studies cited in council policy"

  cat_3_contradiction:
    uses: ["contradicts"]
    seeded_pairs:
      - "grain-free debate (DCM 2018 finding -> 2022 reassessment)"
      - "dominance theory (1970s -> 2009 AVSAB position statement)"

  cat_4_ingestion_integrity:
    uses: ["alias_of"]
    seeded_pairs:
      - "GSD / German Shepherd / Alsatian (alias resolution test)"
      - "Pit Bull / APBT / American Pit Bull Terrier"

  cat_6_temporal:
    uses: ["supersedes"]
    seeded_chains:
      - "Pet food recalls: announced -> investigated -> resolved"
      - "Training methodology consensus shift: dominance theory -> positive reinforcement"

  cat_8_ontology_coherence:
    uses: "the entire ontology declared here vs the graph that gets built from /vault"
    notes: "Cat 8 reads this file as the source-of-truth claim against the built graph"

  cat_4g_phantom_edges:
    uses: "evidence_rule field on every edge type"
    notes: >
      First worked example of per-edge-type evidence registration.
      The phantom-edge probe (proposed at SME #4) reads each edge
      against the rule registered for its type.
