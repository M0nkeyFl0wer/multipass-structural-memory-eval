- id: q19_raw_pet_food_pathogen_rates
  text: What percentage of raw pet food samples tested positive for Listeria monocytogenes
    in the FDA's two-year study, and how did that compare to the rate for Salmonella
    in the same sample set?
  expected_sources:
  - 16.3%
  - Listeria monocytogenes
  - 7.7%
  - Salmonella
  - '196'
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: pathogen contamination rates in raw pet food

    Answer note: 2018-02-22-fda-raw-pet-food-safety-study.md (nutrition_safety domain)

    The query mentions "raw pet food" and "pathogen" — the answer note filename contains

    "raw-pet-food-safety-study" which is NOT semantically similar to "Listeria monocytogenes

    contamination rates" or "percentage positive" in the query. A flat retriever must

    traverse: query → concept_raw_pet_food_safety (mentioned in query as implicit
    context)

    → pub_fda_raw_pet_food_factsheet_2018 → mentions → concept_listeria_petfood. The
    16.3%

    figure is in the factsheet body, not the title.

    '
  why_flat_fails: '"16.3%" and "Listeria monocytogenes" do not appear in the query
    text. A semantic

    search for the query terms will not rank the raw pet food safety note in the top
    10,

    because the note''s filename (2018-02-22-fda-raw-pet-food-safety-study.md) contains

    no term from "Listeria monocytogenes percentage" or "raw pet food contamination
    rates."

    The note''s title is about the FDA factsheet, not about specific pathogen rates.

    '
- id: q20_brucellosis_treatment_outcome
  text: When canine brucellosis is treated, what factors determine whether treatment
    is likely to succeed, and what does the CDC identify as the main regulatory gap
    preventing better control?
  expected_sources:
  - multimodal
  - surgical sterilization
  - interstate
  - treatment alone
  - absence of a federal mandate
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: brucellosis treatment success and regulatory gap

    Answer note: 2018-08-cdc-brucellosis-canis-public-health.md (veterinary_research
    domain)

    The query mentions "treatment" and "regulatory gap" — neither appears in the answer
    note

    filename. A flat retriever must traverse: query → concept_brucellosis_canis →
    CDC article

    → mentions treatment protocol (multimodal: surgery + antimicrobials) AND mentions
    regulatory

    gap (no federal mandate for interstate testing). The CDC article''s filename does
    not

    contain "treatment" or "regulatory gap."

    '
  why_flat_fails: '"Treatment success factors" and "regulatory gap" are not in the
    query entity that

    would match the filename. The note''s filename is "2018-08-cdc-brucellosis-canis-public-health"

    — a date + agency + disease name string. Semantic similarity of "brucellosis treatment

    regulatory gap" to this filename is low; the CDC article is about the disease
    itself,

    not specifically about treatment outcomes or regulatory gaps as the filename would
    suggest.

    '
- id: q21_gdv_surgical_prognostic_factors
  text: In surgically managed GDV cases, which intraoperative finding was the strongest
    predictor of mortality, and what was the overall perioperative mortality rate
    for the study?
  expected_sources:
  - gastric necrosis
  - 46%
  - 18%
  - perioperative mortality
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: GDV surgery mortality predictor

    Answer note: 1996-06-brourman-gdv-perioperative-mortality.md (veterinary_research)

    Query uses "GDV" which appears in filename (brourman-gdv-perioperative-mortality),
    so

    this is borderline — BUT the key is the 46% figure and gastric necrosis as the
    strongest

    predictor. A flat retriever retrieving the note by GDV semantic match would still
    need

    to know that "gastric necrosis" is the specific answer, not just general GDV info.

    The question asks for a specific intraoperative finding, not just GDV context.

    '
  why_flat_fails: 'While "GDV" appears in both the query and filename, a flat retriever
    asked "which

    intraoperative finding was the strongest predictor" would retrieve the note but
    likely

    summarize incorrectly — the note contains multiple mortality factors (partial
    gastrectomy

    35%, splenectomy 32%, cardiac arrhythmias 38%) and a flat retriever without graph

    traversal would not reliably identify "gastric necrosis at 46%" as the singular

    strongest predictor vs. the other statistically elevated factors. Graph traversal

    requires: pub_brourman → mentions → concept_gastric_necrosis with the 46% evidence
    edge.

    '
- id: q22_domination_training_rejected_why
  text: What specific evidence led the academic community to reject the dominance-hierarchy
    model of wolf social structure, and how did this change professional veterinary
    behavior guidance?
  expected_sources:
  - Ellesmere Island
  - family
  - division-of-labor
  - priority access to resources
  - AVSAB 2008
  min_hops: 3
  sme_category: cat_2c
  hop_chain_description: 'Query: dominance hierarchy rejection evidence

    Answer requires traversing from Schenkel (1947) → Mech (1999) → AVSAB (2008).

    The query asks about BOTH the academic evidence (Mech''s wild wolf observations)
    AND

    the professional guidance change (AVSAB position). The evidence is distributed

    across three notes: 1999-mech-alpha-status-self-correction.md (Ellesmere Island,
    family

    pack model) → 2008-avsab-dominance-position-statement.md (recommends against

    dominance theory). A flat retriever asked this compound question cannot traverse

    the authored_by → affiliated_with chain across three notes.

    '
  why_flat_fails: 'The query "dominance hierarchy rejection evidence" does not contain
    "Ellesmere Island"

    or "family pack" — the key evidence terms are not in the query. A flat retriever

    searching for "dominance hierarchy wolf" might retrieve Schenkel 1947 or Mech
    1999,

    but cannot produce the connected answer spanning both the wild-pack research finding

    AND the AVSAB 2008 clinical guidance. The second hop (AVSAB) is entirely absent
    from

    the query''s semantic field.

    '
- id: q23_dognition_cognitive_aging_hypothesis
  text: What hypothesis about the relationship between breed lifespan and cognitive
    aging did Watowich et al. 2020 test, and what did they conclude about it?
  expected_sources:
  - compression hypothesis
  - quadratic
  - 4,137
  - rejected
  - lifespan
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: Watowich cognitive aging hypothesis test conclusion

    Answer note: 2020-watowich-dognition-cognitive-aging-uniform-trajectory.md (behavioral_research)

    Query mentions "cognitive aging" and "breed lifespan" — the note filename contains

    "dognition" and "cognitive-aging" which partially overlap, BUT the question asks
    about

    a specific hypothesis name ("compression hypothesis") that is NOT in the query
    text.

    A flat retriever would retrieve the note but would not know to look for "compression

    hypothesis" as the specific tested hypothesis.

    '
  why_flat_fails: 'The hypothesis name "compression hypothesis" is the load-bearing
    answer — the question

    asks "what hypothesis...did they test" — but this term does NOT appear in the
    query.

    A flat retriever doing semantic search for "Watowich cognitive aging breed lifespan"
    would

    retrieve the note but has no signal to extract the specific hypothesis name "compression

    hypothesis" vs. the alternative "truncation hypothesis" which was also tested.
    The graph

    must traverse: pub_watowich → subject_of → concept_breed_lifespan_cognitive_tradeoff
    →

    mentions "compression hypothesis" to get the answer.

    '
- id: q24_safer_assessment_instrument_limits
  text: How well did the SAFER behavior assessment instrument perform at identifying
    dogs with aggression history, according to Bollen and Horowitz 2012?
  expected_sources:
  - sensitivity = 0.60
  - specificity = 0.50
  - ASPCA
  - C-BARQ
  - '67'
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: SAFER assessment instrument performance Bollen Horowitz
    2012

    Answer note: 2012-bollen-horowitz-safer-validity-limits.md (behavioral_research)

    Query contains "SAFER" and "Bollen Horowitz 2012" — so retrieval is possible for
    a

    flat system that matches instrument name to filename. BUT the question asks for

    specific numeric performance values (sensitivity, specificity) — these are in
    the

    note body, not the title. A flat retriever would retrieve the note but may not

    extract the specific numbers.

    '
  why_flat_fails: 'While SAFER is in the query and filename, the specific performance
    values

    (sensitivity 0.60, specificity 0.50) are body content. More critically, the note

    reveals a CONTRADICTION: the ASPCA developed and promotes SAFER, but the study

    found near-chance performance. A flat retriever would return the numeric values

    without surfacing the contradiction. Graph traversal requires traversing from

    pub_bollen_horowitz → mentions → concept_safer_assessment AND the contradicts
    edge

    to concept_behavior_assessment_limitations (the gap between ASPCA endorsement
    and

    empirical validity).

    '
- id: q25_leptospirosis_vaccine_serovar_recommendation
  text: Which four serovars are included in the ACVIM's recommended leptospirosis
    vaccine for dogs in North America, and what populations does the ACVIM recommend
    receive it?
  expected_sources:
  - Icterohaemorrhagiae
  - Canicola
  - Grippotyphosa
  - Pomona
  - all dogs
  - North America
  min_hops: 2
  sme_category: cat_2c
  hop_chain_description: 'Query: ACVIM lepto vaccine serovars recommended populations

    Answer note: 2023-11-acvim-leptospirosis-consensus.md (veterinary_research)

    The query mentions "ACVIM" and "leptospirosis" — the filename contains

    "acvim-leptospirosis-consensus" so semantic matching may retrieve it. BUT the

    specific serovar names (Icterohaemorrhagiae, Canicola, Grippotyphosa, Pomona)
    are

    NOT in the query and are body content. The recommendation scope ("all dogs in

    North America") is also body content, not in the filename title.

    '
  why_flat_fails: 'A flat retriever retrieving the ACVIM note by "leptospirosis vaccine"
    semantic match

    would not reliably extract the four specific serovar names vs. other vaccine details.

    The phrase "all dogs in North America" is the load-bearing answer for who should

    receive it — the pre-2023 guidance was breed/lifestyle-specific, so this represents

    a contradiction with prior guidance. The graph must traverse to the contradiction_pair

    edge to correctly answer both the serovars AND the changed recommendation.

    '
- id: q26_avsab_aspsa_safer_endorsement_contradiction
  text: What is the documented discrepancy between the ASPCA's endorsement of the
    SAFER behavior assessment and the empirical validity results reported by Bollen
    and Horowitz 2012?
  expected_sources:
  - ASPCA
  - SAFER
  - sensitivity = 0.60
  - specificity = 0.50
  - not predictive of home behavior
  min_hops: 3
  sme_category: cat_3
  hop_chain_description: 'Query: ASPCA SAFER endorsement vs empirical validity Bollen
    Horowitz

    Answer requires connecting: 2012-bollen-horowitz-safer-validity-limits.md (study
    finding

    sensitivity 0.60/specificity 0.50) → ASPCA''s own position statement acknowledging

    "behavior assessments have not proven highly accurate or precise when used to
    predict

    aggression after adoption." The ASPCA position is referenced in the Bollen/Horowitz
    note

    itself (line 110), not in a separate note. Graph must traverse:

    pub_bollen_horowitz → mentions → concept_safer_assessment → mentions → org_aspca,

    AND the contradicts edge to concept_behavior_assessment_limitations.

    '
  why_flat_fails: 'The ASPCA endorsement is organizational (ASPCA develops/promotes
    SAFER) and the

    empirical validity is a numeric finding — these are not semantically similar concepts.

    A flat retriever asked about "ASPCA SAFER validity" might retrieve either the
    ASPCA

    website OR the Bollen/Horowitz study, but cannot surface the specific internal

    contradiction that the ASPCA''s own later position statement acknowledges the
    limitation

    that Bollen/Horowitz''s study demonstrated empirically.

    '
- id: q27_fda_dcm_framing_evolution
  text: How did the FDA's public framing of the diet-DCM relationship change between
    its 2018 announcement and its 2019 third status report?
  expected_sources:
  - '2018'
  - '2019'
  - grain-free
  - pulses
  - multifactorial
  - complex
  min_hops: 2
  sme_category: cat_3
  hop_chain_description: 'Query: FDA diet-DCM framing change 2018 2019

    Answer spans two notes: 2018-07-fda-dcm-investigation.md (initial announcement
    —

    grain-free focused framing) → 2019-06-fda-dcm-third-status-report.md (pulses as

    more salient feature, multifactorial framing). Graph must traverse the contradicts

    edge between pub_fda_dcm_third_status_report_2019 and pub_fda_dcm_investigation_main.

    '
  why_flat_fails: 'The query asks about a CHANGE between two timepoints — "framing
    change" is a

    comparative relation, not a retrievable fact from a single note. A flat retriever

    would need to retrieve both notes and compare them, which requires the supersedes

    and contradicts edges between the two publications. The intermediate entity between

    2018 and 2019 is the concept change from "grain-free as primary signal" to

    "pulses as more salient feature" — "pulses" does NOT appear in the query.

    '
- id: q28_small_breed_lepto_vaccine_risk_reversal
  text: How has the veterinary consensus on whether small-breed dogs face elevated
    adverse reaction risk from leptospirosis vaccines changed between historical guidance
    and the 2023 ACVIM consensus statement?
  expected_sources:
  - small breeds
  - adverse reactions
  - rare
  - <53 per 10,000
  - all dogs
  min_hops: 2
  sme_category: cat_3
  hop_chain_description: 'Query: small breed lepto vaccine adverse reaction risk ACVIM
    consensus change

    Answer requires connecting pre-2020 guidance (historical "vaccinate only high-risk

    dogs, be cautious in small breeds") to 2023 ACVIM consensus (all dogs annually,

    modern vaccines have equivalent safety to other vaccines). The contradiction edge

    is declared in the 2023-11-acvim-leptospirosis-consensus.md: the 2023 statement

    "directly reverses the pre-2020 normative position" on small-breed vaccination.

    '
  why_flat_fails: 'The query mentions "small breed" and "adverse reaction risk" —
    these are NOT in the

    answer note filename "2023-11-acvim-leptospirosis-consensus.md". The specific

    figure "<53 adverse events per 10,000 doses" and the phrase "not higher for

    leptospirosis vaccines than distemper-parvovirus or rabies vaccines" are body
    content.

    A flat retriever would not know to look for this note when asked about small-breed

    vaccine risk. The graph must traverse: pub_acvim_leptospirosis_consensus_2023
    →

    contradicts → pub_legacy_lepto_vaccine_reaction_consensus.

    '
- id: q29_dominance_theory_endorsement_status
  text: Did Schenkel's 1947 captive-wolf expression studies form the basis for dominance-based
    dog training advice, and was this basis subsequently rejected by L. David Mech
    and the AVSAB?
  expected_sources:
  - Schenkel
  - captive wolves
  - Mech
  - Ellesmere Island
  - AVSAB
  - priority access to resources
  min_hops: 3
  sme_category: cat_3
  hop_chain_description: 'Query: Schenkel dominance basis rejected Mech AVSAB

    Answer requires three-hop chain: Schenkel 1947 (captive wolf basis) → Mech 1999

    (Ellesmere Island wild packs, family model, contradicts Schenkel) → AVSAB 2008

    (recommends against dominance theory, contradicts Schenkel''s explanatory framework).

    This is the canonical dominance_theory_pre_vs_post_1999 contradiction pair.

    '
  why_flat_fails: 'The query asks for a chain of THREE entities (Schenkel, Mech, AVSAB)
    connected by

    contradict/supersedes edges. A flat retriever asked "was Schenkel''s work rejected

    by Mech and AVSAB" would likely retrieve Schenkel''s note OR Mech''s note OR AVSAB''s

    note, but cannot produce the connected answer that maps the specific contradictory

    claims across all three. The intermediate entity "captive wolves" (Schenkel''s
    method)

    is NOT in the query text.

    '
- id: q30_alpha_wolf_family_pack_model_contradiction
  text: What is the specific wolf-pack structural model that Mech 1999 concluded applies
    to natural wolf packs, and how does it directly contradict Schenkel 1947's foundational
    captive-wolf observations?
  expected_sources:
  - family
  - division-of-labor
  - adult parents
  - captive wolves
  - non-natural assortments
  - priority access
  min_hops: 2
  sme_category: cat_3
  hop_chain_description: 'Query: Mech 1999 wolf pack family model vs Schenkel 1947

    Answer in 1999-mech-alpha-status-self-correction.md (Mech) and referenced against

    Schenkel 1947. The key phrase from Mech''s abstract: "the typical wolf pack is
    a family,

    with the adult parents guiding the activities of the group in a division-of-labor

    system." The contradiction: Schenkel observed captive wolves in unnatural groups,

    found alpha/dominance hierarchy; Mech observed wild wolves on Ellesmere Island,

    found family/division-of-labor.

    '
  why_flat_fails: '"Family pack model" and "division-of-labor" do not appear in the
    query. The query

    mentions "wolf-pack structural model" generically — a flat retriever asked this

    question would not know to look for the specific phrases "family, with the adult

    parents" in Mech 1999 vs "dominance hierarchy" in Schenkel 1947. The graph must

    traverse from pub_mech_1999_alpha_status → subject_of → concept_alpha_wolf,

    then follow the contradicts edge to pub_schenkel_1947_wolf_expression.

    '
- id: q31_apbt_kennel_club_registration_variants
  text: How does the American Pit Bull Terrier (APBT) relate to breeds registered
    by different kennel clubs, and what is the FCI's formal position on UKC registration
    of APBT?
  expected_sources:
  - American Pit Bull Terrier
  - UKC
  - FCI
  - not recognise
  - United Kennel Club
  min_hops: 2
  sme_category: cat_4
  hop_chain_description: 'Query: APBT kennel club registration variants FCI UKC

    Answer in fci-akc-kennel-club-comparative-structure.md (breed_standards) and

    ukc-american-pit-bull-terrier.md. The FCI note explicitly states: "In contrast,

    the FCI does not recognise the UKC and no agreement is in place." The UKC registers

    APBT, but FCI (which includes AKC through Letter of Agreement) does not recognize
    UKC.

    This creates the breed registration hierarchy for APBT across registries.

    '
  why_flat_fails: 'The query mentions "APBT" and "kennel club" — the answer note filename
    for the FCI

    comparative note is "fci-akc-kennel-club-comparative-structure.md" which does
    not

    contain "APBT" or "UKC." A flat retriever searching for "APBT kennel club" would

    retrieve the UKC APBT breed standard note, but NOT the FCI comparative note that

    contains the critical statement about FCI not recognizing UKC. Graph traversal

    requires: breed_american_pit_bull_terrier (APBT) → registered_by → org_ukc →

    org_fci → [no agreement] edge.

    '
