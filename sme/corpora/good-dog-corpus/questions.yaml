version: good-dog-corpus-v0.2-fixed
description: "Ground-truth question set for good-dog-corpus, exercising:\n  Cat 1\
  \  (factual retrieval / The Lookup)         — 4 questions\n  Cat 2c (multi-hop reasoning\
  \ / The Stairway)     — 10 questions\n  Cat 3  (contradiction surfacing / The Dissonance)\
  \ — 8 questions\n  Cat 4  (alias resolution / The Threshold 4a)    — 5 questions\n\
  \  Cat 6  (temporal supersession / The Archive)    — 7 questions\n  Cat 7  (token\
  \ efficiency / The Abacus)          — 2 questions\n\nEach question's `expected_sources`\
  \ are substrings verified present in\n≥1 vault note. The substring matcher is documented\
  \ as a known-limited\nsignal (see mempalace#101 long comment); upgrading to LongMemEval's\n\
  GPT-4o judge for Cat 1 is planned via the cross-validation harness in\n`scripts/cross_validate_longmemeval.py`.\n"
