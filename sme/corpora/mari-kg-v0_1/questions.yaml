    - Burnout
    - Rest guilt
  min_hops: 2
  sme_category: cat_3

- id: q15_patience_vs_shortsighted
  text: "What concept counteracts short-sighted decision making?"
  expected_sources:
    - Patience and self-control
    - Short-sighted decision making
  min_hops: 1
  sme_category: cat_3

- id: q16_course_alias
  text: "Are Embodied Abundance Lab and The Embodied Abundance Lab the same course?"
  expected_sources:
    - Embodied Abundance Lab
    - The Embodied Abundance Lab
  min_hops: 1
  sme_category: cat_4

- id: q17_module_alias
  text: "Are Module 1 and Module 1 Internalized Capitalism the same module?"
  expected_sources:
